<!doctype html>
<html lang="ko"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Command Center — Token Value Capture</title><style>
*{box-sizing:border-box}body{margin:0;background:#07090d;color:#e7ebf2;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}button{font:inherit}.wrap{min-height:100vh;padding:18px;background:linear-gradient(135deg,#07090d,#111827)}.top{display:flex;align-items:center;justify-content:space-between;border:1px solid #253044;background:#0e1420;border-radius:14px;padding:14px 16px;margin-bottom:12px}.title{font-size:22px;font-weight:800;letter-spacing:-.04em}.sub{font-size:12px;color:#93a0b8}.tabs{display:flex;gap:6px}.tabs button{border:1px solid #28354a;background:#111a2a;color:#aeb9ce;border-radius:9px;padding:8px 11px;cursor:pointer}.tabs button.active{background:#2563eb;color:white;border-color:#3b82f6}.stats{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:12px}.stat{border:1px solid #253044;background:#0e1420;border-radius:12px;padding:12px}.stat .l{font-size:11px;color:#93a0b8}.stat .v{font-size:22px;font-weight:800;margin-top:5px}.layout{display:grid;grid-template-columns:1fr 420px;gap:12px}.panel{border:1px solid #253044;background:#0e1420;border-radius:14px;overflow:hidden}.head{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid #253044}.head h2{margin:0;font-size:14px}.filters{display:flex;gap:6px;flex-wrap:wrap}.filter{font-size:11px;border:1px solid #34425b;color:#aeb9ce;border-radius:999px;padding:5px 8px;background:#111a2a;cursor:pointer}.filter.on{background:#1d4ed8;color:#fff;border-color:#3b82f6}.table{width:100%;border-collapse:collapse;font-size:12px}.table th{position:sticky;top:0;background:#101827;color:#93a0b8;text-align:left;font-weight:600;padding:9px;border-bottom:1px solid #253044}.table td{padding:9px;border-bottom:1px solid #1c2638;color:#dce2ee}.table tr:hover{background:#111a2a}.right{display:grid;gap:12px}.bucket{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px}.b{border:1px solid #2a3850;background:#111827;border-radius:12px;padding:10px}.b .name{font-size:12px;color:#aeb9ce}.b .num{font-size:22px;font-weight:800}.detail{padding:14px}.coin{font-size:20px;font-weight:800}.chip{display:inline-block;font-size:11px;border-radius:999px;padding:4px 7px;margin:4px 4px 0 0}.green{background:#0c2b20;color:#67e8a5}.amber{background:#2b210c;color:#facc15}.red{background:#331515;color:#fca5a5}.gray{background:#1f2937;color:#cbd5e1}.memo{margin-top:12px;border-top:1px solid #253044;padding-top:12px;color:#cbd5e1;font-size:13px}.q{margin-top:10px;border:1px solid #2a3850;border-radius:10px;background:#0b1019;padding:10px;font-size:12px;color:#aeb9ce}@media(max-width:1050px){.layout{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}}
</style></head><body><div class="wrap"><header class="top"><div><div class="title">Command Center</div><div class="sub">고밀도 스캔: 후보를 빠르게 걸러내고 오른쪽에서 논지를 확인</div></div><nav class="tabs"><button class="active">의사결정</button><button>맵</button><button>원자료</button></nav></header><section class="stats"><div class="stat"><div class="l">검토우선</div><div class="v">12</div></div><div class="stat"><div class="l">함정</div><div class="v">38</div></div><div class="stat"><div class="l">고희석</div><div class="v">29</div></div><div class="stat"><div class="l">데이터부족</div><div class="v">74</div></div><div class="stat"><div class="l">P/HR 중앙</div><div class="v">24.7x</div></div><div class="stat"><div class="l">갱신</div><div class="v">12:02</div></div></section><main class="layout"><section class="panel"><div class="head"><h2>후보 스캔</h2><div class="filters"><button class="filter on" onclick="setFilter('all',this)">전체</button><button class="filter" onclick="setFilter('priority',this)">검토우선</button><button class="filter" onclick="setFilter('trap',this)">함정</button><button class="filter" onclick="setFilter('risk',this)">고희석</button></div></div><table class="table"><thead><tr><th>코인</th><th>버킷</th><th>논지</th><th>P/HR</th><th>FDV/Mcap</th><th>다음 질문</th></tr></thead><tbody id="rows"></tbody></table></section><aside class="right"><section class="panel"><div class="head"><h2>버킷</h2></div><div class="bucket"><div class="b"><div class="name">Research</div><div class="num">12</div></div><div class="b"><div class="name">Cheap trap</div><div class="num">38</div></div><div class="b"><div class="name">Dilution</div><div class="num">29</div></div><div class="b"><div class="name">Missing</div><div class="num">74</div></div></div></section><section class="panel"><div class="head"><h2>선택 후보</h2></div><div class="detail" id="detail"></div></section></aside></main></div><script>
const rows=[['Gains','GNS','priority','holder revenue + 싼 P/HR','2.7x','1.4x','귀속 방식 확인'],['Aerodrome','AERO','priority','수익 크지만 인센티브 확인','3.4x','2.1x','지속성 확인'],['Stargate','STG','trap','싸지만 holder revenue 불명확','—','1.2x','토큰 포획 경로 확인'],['NewFi','NFI','risk','수익 있음, FDV 부담 큼','8.1x','9.8x','언락 구조 확인'],['OpenLedger','OPEN','trap','내러티브 있으나 포획 약함','—','—','토큰 수요 경로 확인'],['Tron','TRX','priority','holder revenue 실측, 비싼 편','67x','1.0x','성장 지속성 확인']];
let current='all';function render(){const tb=document.getElementById('rows');tb.innerHTML='';rows.filter(r=>current==='all'||r[2]===current).forEach((r,i)=>{const tr=document.createElement('tr');tr.onclick=()=>select(r);tr.innerHTML=`<td><b>${r[0]}</b> <span style="color:#93a0b8">${r[1]}</span></td><td><span class="chip ${r[2]==='priority'?'green':r[2]==='trap'?'amber':'red'}">${r[2]}</span></td><td>${r[3]}</td><td>${r[4]}</td><td>${r[5]}</td><td>${r[6]}</td>`;tb.appendChild(tr)});select(rows.find(r=>current==='all'||r[2]===current)||rows[0])}function setFilter(f,btn){current=f;document.querySelectorAll('.filter').forEach(b=>b.classList.remove('on'));btn.classList.add('on');render()}function select(r){document.getElementById('detail').innerHTML=`<div class="coin">${r[0]} <span style="color:#93a0b8;font-size:14px">${r[1]}</span></div><span class="chip ${r[2]==='priority'?'green':r[2]==='trap'?'amber':'red'}">${r[2]}</span><div class="memo"><b>한줄 논지</b><br>${r[3]}</div><div class="memo"><b>핵심 숫자</b><br>P/HR ${r[4]} · FDV/Mcap ${r[5]}</div><div class="q">다음 질문: ${r[6]}</div>`}render();
</script></body></html>
